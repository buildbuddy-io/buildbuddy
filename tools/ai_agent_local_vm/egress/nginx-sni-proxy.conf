# Host-side SNI-preview egress proxy for the dev VM. Same design as
# .devcontainer/nginx-sni-proxy.conf (ssl_preread, no TLS termination, so
# HTTP/2+gRPC pass through) but runs as a DEDICATED host nginx instance
# (nginx -c this-file) so it never touches the host's main nginx.
#
# KEEP THE ALLOWLIST IN SYNC with .devcontainer/nginx-sni-proxy.conf. This
# copy additionally allowlists the VM provisioning hosts (Ubuntu archive /
# NodeSource) because, unlike the container, the VM installs packages at first
# boot *through* this filter. __RESOLVER__ is substituted by host-egress.sh.

load_module /usr/lib/nginx/modules/ngx_stream_module.so;

user www-data;
worker_processes auto;
pid /run/bbvm-sni.pid;
error_log /var/log/bbvm-sni/error.log warn;

events { worker_connections 1024; }

stream {
    resolver __RESOLVER__ ipv6=off valid=10s;
    resolver_timeout 5s;

    log_format sni '$remote_addr [$time_local] sni="$ssl_preread_server_name" '
                   'upstream="$upstream_addr" sent=$bytes_sent recv=$bytes_received '
                   'session=$session_time';
    access_log /var/log/bbvm-sni/sni.log sni;

    map $ssl_preread_server_name $upstream {
        # ===== mirror of .devcontainer/nginx-sni-proxy.conf =====
        # --- Bazel ---
        releases.bazel.build                  releases.bazel.build:443;
        mirror.bazel.build                    mirror.bazel.build:443;
        bcr.bazel.build                       bcr.bazel.build:443;
        registry.bazel.build                  registry.bazel.build:443;
        bcr.cloudflaremirrors.com             bcr.cloudflaremirrors.com:443;
        # --- GitHub ---
        github.com                            github.com:443;
        codeload.github.com                   codeload.github.com:443;
        api.github.com                        api.github.com:443;
        objects.githubusercontent.com         objects.githubusercontent.com:443;
        raw.githubusercontent.com             raw.githubusercontent.com:443;
        release-assets.githubusercontent.com  release-assets.githubusercontent.com:443;
        # --- toolchains ---
        nodejs.org                            nodejs.org:443;
        registry.npmjs.org                    registry.npmjs.org:443;
        dl.google.com                         dl.google.com:443;
        go.dev                                go.dev:443;
        golang.org                            golang.org:443;
        proxy.golang.org                      proxy.golang.org:443;
        sum.golang.org                        sum.golang.org:443;
        storage.googleapis.com                storage.googleapis.com:443;
        pypi.org                              pypi.org:443;
        files.pythonhosted.org                files.pythonhosted.org:443;
        # --- Rust / Cargo ---
        static.rust-lang.org                  static.rust-lang.org:443;
        forge.rust-lang.org                   forge.rust-lang.org:443;
        crates.io                             crates.io:443;
        index.crates.io                       index.crates.io:443;
        static.crates.io                      static.crates.io:443;
        # --- BuildBuddy anon BES ---
        remote.buildbuddy.io                  remote.buildbuddy.io:443;
        app.buildbuddy.io                     app.buildbuddy.io:443;
        # --- Claude Code runtime + OAuth ---
        api.anthropic.com                     api.anthropic.com:443;
        claude.com                            claude.com:443;
        platform.claude.com                   platform.claude.com:443;
        console.anthropic.com                 console.anthropic.com:443;

        # ===== VM-only: first-boot provisioning over HTTPS =====
        archive.ubuntu.com                    archive.ubuntu.com:443;
        security.ubuntu.com                   security.ubuntu.com:443;
        deb.nodesource.com                    deb.nodesource.com:443;

        default                               "";
    }

    server {
        listen 127.0.0.1:8443;
        ssl_preread on;
        proxy_connect_timeout 10s;
        proxy_timeout 600s;
        proxy_pass $upstream;
    }
}
