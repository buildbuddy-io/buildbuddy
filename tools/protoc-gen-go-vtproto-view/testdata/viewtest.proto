syntax = "proto3";

import "proto/view.proto";

package viewtest;

option go_package = "github.com/buildbuddy-io/buildbuddy/tools/protoc-gen-go-vtproto-view/testdata/viewtest";

// Fixture exercising the generator: nested messages, implicit inclusion of
// intermediate message fields, fields in multiple views, presence-only
// annotated message fields, and one field of each supported scalar kind.

enum Color {
  COLOR_UNKNOWN = 0;
  COLOR_RED = 1;
}

message Inner {
  string name = 1 [(view.name) = "Summary"];
  int64 size_bytes = 2 [(view.name) = "Summary", (view.name) = "Sizes"];
  bytes payload = 3;
}

message Middle {
  // Included in "Summary" and "Sizes" implicitly via Inner's annotations.
  Inner inner = 1;
  bool enabled = 2 [(view.name) = "Summary"];
  // Never annotated; always skipped.
  repeated int64 values = 3;
}

message Outer {
  Middle middle = 1;
  Color color = 2 [(view.name) = "Summary"];
  uint32 count = 3 [(view.name) = "Sizes"];
  bytes blob = 4 [(view.name) = "Summary"];
  // Presence-only: Inner has no "PresenceOnly" fields, so only
  // HasDetached is recorded.
  Inner detached = 5 [(view.name) = "PresenceOnly"];
}
