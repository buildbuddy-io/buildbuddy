apiVersion: 1

datasources:
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    uid: vm
    isDefault: true
    url: ${GF_DATASOURCE_URL}
    version: 1
    editable: false
    jsonData:
      # Must match the real scrape interval of the data being queried, since
      # Grafana derives $__rate_interval from it.
      timeInterval: ${GF_DATASOURCE_SCRAPE_INTERVAL}
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    jsonData:
      port: ${CLICKHOUSE_PORT}
      host: host.docker.internal
      username: ${CLICKHOUSE_USERNAME}
      traces:
        defaultDatabase: otel_local
        defaultTable: otel_traces
        otelEnabled: true
        otelVersion: latest # TODO: pin?
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
