syntax = "proto3";

import "proto/resource.proto";
import "proto/remote_execution.proto";
import "github.com/planetscale/vtprotobuf/vtproto/ext.proto";

package distributed_cache;

message Key {
  string key = 1;
  int64 size_bytes = 2;
}

message ReadRequest {
  reserved 1, 2, 4;
  int64 offset = 3;
  int64 limit = 5;
  resource.ResourceName resource = 6;
}

message ReadResponse {
  option (vtproto.mempool) = true;
  bytes data = 1;
}

// Next Tag: 9
message WriteRequest {
  option (vtproto.mempool) = true;
  reserved 1, 2, 6;
  bool finish_write = 3;

  // If check_already_exists, the server should return an ALREADY_EXISTS error
  // for CAS blobs (not AC!) that already exist in the cache.
  bool check_already_exists = 8;
  bytes data = 4;
  resource.ResourceName resource = 7;

  // A node that this data should eventually be handed off to.
  // Clients should attempt to replicate this data when possible.
  string handoff_peer = 5;
}

message WriteResponse {
  int64 committed_size = 1;
}

message DeleteRequest {
  reserved 1, 2;
  resource.ResourceName resource = 3;
}

message DeleteResponse {}

message FindMissingRequest {
  reserved 1, 2;
  repeated resource.ResourceName resources = 3;

  // Propagates the originating FindMissing purpose across the distributed-cache
  // peer protocol so the authoritative node can attribute present/absent
  // metrics to the right code path. Observability only; does not affect lookup.
  build.bazel.remote.execution.v2.FindMissingBlobsRequest.Purpose purpose = 4;
}

message FindMissingResponse {
  repeated Key missing = 1;
}

message MetadataRequest {
  reserved 1, 2;
  resource.ResourceName resource = 3;
}

message MetadataResponse {
  int64 stored_size_bytes = 1;
  int64 last_access_usec = 2;
  int64 last_modify_usec = 3;
  int64 digest_size_bytes = 4;
}

message GetWithMetadataRequest {
  resource.ResourceName resource = 1;
}

message GetWithMetadataResponse {
  bytes data = 1;
  MetadataResponse metadata = 2;
}

message KV {
  Key key = 1;
  bytes value = 2;
}

message GetMultiRequest {
  reserved 1, 2, 3;
  repeated resource.ResourceName resources = 4;
}

message GetMultiResponse {
  repeated KV key_value = 1;
}

message HeartbeatRequest {
  string source = 1;
}

message HeartbeatResponse {}

service DistributedCache {
  rpc Metadata(MetadataRequest) returns (MetadataResponse);
  rpc Read(ReadRequest) returns (stream ReadResponse);
  rpc Write(stream WriteRequest) returns (WriteResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc FindMissing(FindMissingRequest) returns (FindMissingResponse);
  rpc GetMulti(GetMultiRequest) returns (GetMultiResponse);
  rpc GetWithMetadata(GetWithMetadataRequest) returns (GetWithMetadataResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
