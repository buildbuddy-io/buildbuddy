syntax = "proto3";

import "google/protobuf/descriptor.proto";

package view;

// Annotations consumed by //tools/protoc-gen-go-vtproto-view, which generates
// zero-allocation wire "views": for each view name used in a message tree, a
// plain struct holding just the annotated fields, plus an UnmarshalWire
// method that decodes only those fields from a serialized message and skips
// everything else.
extend google.protobuf.FieldOptions {
  // Names of the generated views that include this field. A field may belong
  // to any number of views. Message fields on the path to an annotated field
  // are included in the view implicitly; annotating a message field itself
  // records just its presence.
  repeated string name = 50000;
}
