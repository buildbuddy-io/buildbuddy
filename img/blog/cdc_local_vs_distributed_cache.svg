<svg width="100%" viewBox="0 0 680 360" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Local chunk store vs distributed remote cache</title>
  <desc id="desc">A comparison of local CDC chunk reuse with a distributed remote cache that stores chunks in CAS shards and a manifest mapping the original blob to chunk digests.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #141413; }
      .muted { fill: #5f5e5a; font-size: 12px; }
      .title { font-size: 16px; font-weight: 600; }
      .label { font-size: 13px; font-weight: 500; }
      .small { font-size: 12px; }
      .chunk { fill: #e1f5ee; stroke: #0f6e56; stroke-width: .8; }
      .orange { fill: #faece7; stroke: #993c1d; stroke-width: .8; }
      .purple { fill: #eeedfe; stroke: #534ab7; stroke-width: .8; }
      .gray { fill: #f1efe8; stroke: #5f5e5a; stroke-width: .8; }
      .line { stroke: #77766f; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #c8c6be; stroke-width: .8; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <line x1="340" y1="38" x2="340" y2="322" class="dash"/>

  <text x="40" y="38" class="title">Local chunk store</text>
  <text x="380" y="38" class="title">Distributed remote cache</text>

  <!-- Local side -->
  <rect x="42" y="72" width="248" height="46" rx="8" class="gray"/>
  <text x="166" y="92" text-anchor="middle" dominant-baseline="central" class="label">large output blob</text>
  <text x="166" y="110" text-anchor="middle" dominant-baseline="central" class="muted">one machine can split and dedupe locally</text>

  <line x1="166" y1="126" x2="166" y2="160" class="line"/>

  <rect x="52" y="174" width="56" height="42" rx="6" class="chunk"/>
  <text x="80" y="196" text-anchor="middle" dominant-baseline="central" class="small">c1</text>
  <rect x="116" y="174" width="72" height="42" rx="6" class="chunk"/>
  <text x="152" y="196" text-anchor="middle" dominant-baseline="central" class="small">c2</text>
  <rect x="196" y="174" width="48" height="42" rx="6" class="chunk"/>
  <text x="220" y="196" text-anchor="middle" dominant-baseline="central" class="small">c3</text>
  <rect x="252" y="174" width="48" height="42" rx="6" class="chunk"/>
  <text x="276" y="196" text-anchor="middle" dominant-baseline="central" class="small">c4</text>

  <rect x="54" y="250" width="224" height="52" rx="8" class="orange"/>
  <text x="166" y="270" text-anchor="middle" dominant-baseline="central" class="label">local knowledge only</text>
  <text x="166" y="290" text-anchor="middle" dominant-baseline="central" class="muted">doesn't tell other machines how to read blob</text>

  <!-- Bridge -->
  <line x1="292" y1="190" x2="366" y2="190" class="line"/>
  <text x="329" y="174" text-anchor="middle" class="muted">need a protocol</text>

  <!-- Remote side -->
  <rect x="388" y="72" width="106" height="44" rx="8" class="gray"/>
  <text x="441" y="95" text-anchor="middle" dominant-baseline="central" class="label">client</text>
  <rect x="532" y="72" width="106" height="44" rx="8" class="gray"/>
  <text x="585" y="95" text-anchor="middle" dominant-baseline="central" class="label">executor</text>
  <line x1="494" y1="94" x2="528" y2="94" class="line"/>

  <rect x="400" y="148" width="226" height="54" rx="8" class="purple"/>
  <text x="513" y="168" text-anchor="middle" dominant-baseline="central" class="label">manifest / splice recipe</text>
  <text x="513" y="188" text-anchor="middle" dominant-baseline="central" class="muted">blob digest → ordered chunk digests</text>

  <line x1="476" y1="122" x2="486" y2="144" class="line"/>
  <line x1="552" y1="122" x2="540" y2="144" class="line"/>

  <rect x="380" y="240" width="70" height="50" rx="8" class="chunk"/>
  <text x="415" y="258" text-anchor="middle" dominant-baseline="central" class="label">CAS</text>
  <text x="415" y="276" text-anchor="middle" dominant-baseline="central" class="muted">shard 1</text>
  <rect x="466" y="240" width="70" height="50" rx="8" class="chunk"/>
  <text x="501" y="258" text-anchor="middle" dominant-baseline="central" class="label">CAS</text>
  <text x="501" y="276" text-anchor="middle" dominant-baseline="central" class="muted">shard 2</text>
  <rect x="552" y="240" width="70" height="50" rx="8" class="chunk"/>
  <text x="587" y="258" text-anchor="middle" dominant-baseline="central" class="label">CAS</text>
  <text x="587" y="276" text-anchor="middle" dominant-baseline="central" class="muted">shard 3</text>

  <line x1="470" y1="204" x2="426" y2="236" class="line"/>
  <line x1="512" y1="204" x2="504" y2="236" class="line"/>
  <line x1="554" y1="204" x2="578" y2="236" class="line"/>

  <text x="513" y="318" text-anchor="middle" class="muted">chunks are normal CAS blobs</text>
  <text x="513" y="336" text-anchor="middle" class="muted">the manifest makes the original blob readable anywhere</text>
</svg>
